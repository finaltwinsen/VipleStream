<?xml version="1.0" encoding="UTF-8"?>
<!--
    VipleStream primary app icon — variant "Stripe Cut" from the
    Claude-Design mock (temp/design_bundle/viplestream/project/
    VipleStream Icon.html §02 variation A).

    Dark ink ground, horizontal orange stripe, giant Space Grotesk "V"
    rendered as a vector path (no font dependency at render time), a
    white play-triangle carved into the V, and a small orange folio dot
    top-right.

    The "V" text has been converted to a path so the icon renders
    identically on any host / render target — no Space Grotesk
    install needed at image-generation time.

    Exported by assets/icon/render_icon.mjs into:
      - Windows .ico (16, 24, 32, 48, 64, 128, 256 px) — moonlight.ico
      - Android mipmap-*dpi/ic_launcher.png
      - Android mipmap-*dpi/ic_launcher_foreground.png
      - macOS .icns (via a separate tool, not wired yet)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Square ink ground -->
  <rect width="512" height="512" fill="#0D0F0B"/>

  <!-- Orange accent stripe across the middle band -->
  <rect x="0" y="180" width="512" height="160" fill="#FF7A2E"/>

  <!-- Giant "V" — traced as a polygon so there's no Space Grotesk
       dependency at rasterisation time. Silhouette matches the
       Space Grotesk 360pt bold glyph centred on viewBox 256,300. -->
  <polygon fill="#0D0F0B"
           points="78,88 198,88 256,298 314,88 434,88 316,420 196,420"/>

  <!-- Play triangle carved out of the V (paper colour), anchored so
       it reads as a ▶ glyph inside the V's cross-stroke. -->
  <polygon fill="#F2F5E1" points="204,216 204,304 284,260"/>

  <!-- Folio meta dot / live pip, top-right corner -->
  <circle cx="470" cy="46" r="8" fill="#FF7A2E"/>
</svg>
